# REM: Mosquitto Configuration — TelsonBase v6.2.0CC
# REM: Authentication required, anonymous access disabled
# REM: Listener restricted to internal Docker network only

# Disable anonymous access
allow_anonymous false

# Password file for authentication
password_file /mosquitto/config/password_file

# Listen only on default port (internal Docker network)
listener 1883 0.0.0.0

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all
connection_messages true
