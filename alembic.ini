# =======================================================================================
# ALEMBIC CONFIGURATION — DATABASE MIGRATION MANAGEMENT
# =======================================================================================
# Architect: ::Quietfire AI Project::
# Date: February 23, 2026
# v6.3.0CC: Alembic migrations for durable PostgreSQL schema management
# QMS Protocol: SCHEMA-MIG-001 — All schema changes tracked via versioned migrations
# =======================================================================================

[alembic]

# REM: Path to the migration environment (relative to this file)
script_location = alembic

# REM: Template used to generate migration scripts
# file_template = %%(rev)s_%%(slug)s

# REM: sys.path prepend — ensures core.* imports resolve inside Docker (/app)
prepend_sys_path = .

# REM: Timezone for migration revision timestamps (UTC for compliance consistency)
# timezone =

# REM: Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# REM: Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# REM: Set to 'true' to allow .hierarchically managed revision naming
# sourceless = false

# REM: Version path separator — used on Windows
# version_path_separator = os

# REM: Output encoding for migration scripts
output_encoding = utf-8

# REM: SQLAlchemy database URL — resolved via environment variable.
# REM: This is overridden at runtime in env.py using core.config.get_settings().database_url
# REM: The env var interpolation below serves as fallback for CLI-only usage.
sqlalchemy.url = postgresql://telsonbase:telsonbase_dev@postgres:5432/telsonbase


[post_write_hooks]
# REM: Post-write hooks are disabled by default

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
