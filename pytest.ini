# TelsonBase/pytest.ini
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    security: Security test battery - comprehensive security validation
    e2e: End-to-end integration tests across auth, tenancy, security, and audit
asyncio_mode = strict
filterwarnings =
    ignore::DeprecationWarning
