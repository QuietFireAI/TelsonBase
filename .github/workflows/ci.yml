name: TelsonBase CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # ============================================================
  # Stage 1: Unit Tests (fast, no Docker services needed)
  # ============================================================
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short -x \
            --ignore=tests/test_e2e_integration.py \
            --ignore=tests/test_mqtt_stress.py \
            -k "not integration"
        env:
          TELSONBASE_ENV: development
          MCP_API_KEY: ci_test_key_not_real_do_not_use_in_production_000000
          JWT_SECRET_KEY: ci_test_jwt_secret_not_real_do_not_use_000000000
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: sqlite:///test.db
          IDENTICLAW_ENABLED: "false"
          OPENCLAW_ENABLED: "false"
          TOOLROOM_PATH: /tmp/telsonbase_toolroom

      - name: Test summary
        if: always()
        run: echo "Unit tests completed"

  # ============================================================
  # Stage 2: Security Checks
  # ============================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install bandit safety

      - name: Run Bandit (Python security linter)
        run: |
          bandit -r core/ api/ agents/ federation/ toolroom/ gateway/ \
            -ll --format json --output bandit-report.json || true
          bandit -r core/ api/ agents/ federation/ toolroom/ gateway/ \
            -ll --format screen
        continue-on-error: true

      - name: Check for known vulnerable dependencies
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt --format json --output audit-report.json || true
          pip-audit --requirement requirements.txt
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential secret patterns..."
          ! grep -rn "password\s*=\s*['\"][^C][^H]" core/ api/ agents/ --include="*.py" || true
          ! grep -rn "api_key\s*=\s*['\"][0-9a-f]\{32,\}" core/ api/ agents/ --include="*.py" || true
          echo "Secret scan complete"

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-reports
          path: |
            bandit-report.json
            audit-report.json
          retention-days: 30

  # ============================================================
  # Stage 3: Docker Build Validation
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create dummy secrets for compose config validation
        run: |
          mkdir -p secrets
          for f in telsonbase_mcp_api_key telsonbase_jwt_secret \
                   telsonbase_encryption_key telsonbase_encryption_salt \
                   telsonbase_grafana_password; do
            echo "ci_dummy_not_real_do_not_use" > "secrets/$f"
          done
          cp .env.example .env

      - name: Validate docker-compose configuration
        run: docker compose config --quiet

      - name: Build MCP server image
        run: docker build -t telsonbase-mcp:ci -f Dockerfile .

      - name: Build egress gateway image
        run: docker build -t telsonbase-gateway:ci -f gateway/Dockerfile gateway/

      - name: Verify non-root user in container
        run: |
          docker run --rm telsonbase-mcp:ci whoami | grep -q "aiagent" && \
            echo "PASS: Container runs as non-root user (aiagent)" || \
            (echo "FAIL: Container running as root" && exit 1)

      - name: Get image digest for SLSA provenance
        id: image-meta
        run: |
          echo "digest=$(docker image inspect telsonbase-mcp:ci --format '{{.Id}}')" >> "$GITHUB_OUTPUT"

      - name: Generate SLSA Build L2 provenance attestation
        uses: actions/attest-build-provenance@v4
        continue-on-error: true
        # REM: Attestation storage requires a public repository.
        # REM: This step generates provenance on every run but cannot persist
        # REM: until the repo goes public on March 6, 2026. No code change needed
        # REM: at drop time — attestations will store automatically once public.
        with:
          subject-name: telsonbase-mcp
          subject-digest: ${{ steps.image-meta.outputs.digest }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: telsonbase-mcp:ci
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ============================================================
  # Stage 4: Integration Tests (with Docker services)
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, docker-build]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telsonbase
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: telsonbase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run database migrations
        run: python -m alembic upgrade head
        env:
          TELSONBASE_ENV: development
          DATABASE_URL: postgresql://telsonbase:ci_test_password@localhost:5432/telsonbase

      - name: Run full test suite
        run: |
          echo "=== path diagnostics ==="
          echo "SHELL pwd: $(pwd)"
          python -c "
import os, sys
print('Python CWD:', os.getcwd())
print('Python realpath:', os.path.realpath('.'))
import core.baa_tracking
print('core.baa_tracking.__file__:', core.baa_tracking.__file__)
print('agents __init__ exists (abs):', os.path.exists(os.path.join(os.getcwd(), 'agents/__init__.py')))
print('agents __init__ exists (rel):', os.path.exists('agents/__init__.py'))
"
          python -m coverage run \
            --include='core/*,api/*,agents/*,toolroom/*' \
            --omit='core/mqtt_bus.py,core/ollama_service.py,agents/ollama_agent.py' \
            -m pytest tests/ -v --tb=short --no-cov \
            --ignore=tests/test_mqtt_stress.py \
            --ignore=tests/test_e2e_integration.py
          echo "=== post-run path check ==="
          python -c "
import os
print('Python CWD after run:', os.getcwd())
print('agents __init__ exists:', os.path.exists('agents/__init__.py'))
print('agents __init__ abspath:', os.path.abspath('agents/__init__.py'))
print('agents __init__ abspath exists:', os.path.exists(os.path.abspath('agents/__init__.py')))
"
          python -m coverage debug data | head -10 || true
          python -m coverage report --fail-under=80 --ignore-errors
          python -m coverage xml --ignore-errors
        env:
          TELSONBASE_ENV: development
          MCP_API_KEY: ci_test_key_not_real_do_not_use_in_production_000000
          JWT_SECRET_KEY: ci_test_jwt_secret_not_real_do_not_use_000000000
          REDIS_URL: redis://localhost:6379/0
          REDIS_PASSWORD: ""
          DATABASE_URL: postgresql://telsonbase:ci_test_password@localhost:5432/telsonbase
          POSTGRES_PASSWORD: ci_test_password
          MOSQUITTO_HOST: localhost
          MOSQUITTO_PORT: 1883
          MOSQUITTO_USER: ""
          MOSQUITTO_PASSWORD: ""
          OLLAMA_BASE_URL: http://localhost:11434
          IDENTICLAW_ENABLED: "false"
          OPENCLAW_ENABLED: "false"
          TOOLROOM_PATH: /tmp/telsonbase_toolroom

      - name: Run E2E integration tests
        # REM: E2E tests require a live running server (TestClient handles this).
        # REM: They are run separately because they depend on migration state and
        # REM: need REDIS_URL to match the test DB (db 15), not db 0.
        run: |
          python -m pytest tests/test_e2e_integration.py -v --tb=short
        env:
          TELSONBASE_ENV: development
          MCP_API_KEY: ci_test_key_not_real_do_not_use_in_production_000000
          JWT_SECRET_KEY: ci_test_jwt_secret_not_real_do_not_use_000000000
          REDIS_URL: redis://localhost:6379/0
          REDIS_PASSWORD: ""
          DATABASE_URL: postgresql://telsonbase:ci_test_password@localhost:5432/telsonbase
          POSTGRES_PASSWORD: ci_test_password
          MOSQUITTO_HOST: localhost
          MOSQUITTO_PORT: 1883
          MOSQUITTO_USER: ""
          MOSQUITTO_PASSWORD: ""
          OLLAMA_BASE_URL: http://localhost:11434
          IDENTICLAW_ENABLED: "false"
          OPENCLAW_ENABLED: "false"
          TOOLROOM_PATH: /tmp/telsonbase_toolroom

      - name: Verify test count
        run: |
          COUNT=$(python -m pytest tests/ --co -q \
            --ignore=tests/test_mqtt_stress.py 2>/dev/null | tail -1 | grep -oP '\d+')
          echo "Total tests discovered: $COUNT"
          if [ "$COUNT" -lt 718 ]; then
            echo "FAIL: Test count dropped below 718 (found $COUNT) — a test file may have been removed"
            exit 1
          fi
          echo "PASS: Test count healthy ($COUNT tests)"

  # ============================================================
  # Stage 5: Code Quality
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Check import sorting
        run: |
          isort --check-only --diff core/ api/ agents/

      - name: Check for print statements in production code
        run: |
          echo "Checking for stray print() statements..."
          PRINTS=$(grep -rn "^\s*print(" core/ api/ agents/ federation/ toolroom/ \
            --include="*.py" | grep -v "# DEBUG" | grep -v "test_" || true)
          if [ -n "$PRINTS" ]; then
            echo "WARNING: Found print() statements in production code:"
            echo "$PRINTS"
          else
            echo "PASS: No stray print() statements"
          fi

      - name: Verify version consistency
        run: |
          VERSION_PY=$(python -c "exec(open('version.py').read()); print(__version__)")
          VERSION_CONFIG=$(grep "^VERSION" core/config.py | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          VERSION_CHANGELOG=$(grep -m1 '^\#\# \[' CHANGELOG.md | grep -oP '(?<=\[)[^\]]+')
          echo "version.py:  $VERSION_PY"
          echo "config.py:   $VERSION_CONFIG"
          echo "CHANGELOG:   $VERSION_CHANGELOG"
          FAIL=0
          if [ "$VERSION_PY" != "$VERSION_CONFIG" ]; then
            echo "FAIL: Mismatch between version.py and config.py"
            FAIL=1
          fi
          if [ "$VERSION_PY" != "$VERSION_CHANGELOG" ]; then
            echo "FAIL: Mismatch between version.py and CHANGELOG.md"
            FAIL=1
          fi
          if [ "$FAIL" -eq 0 ]; then
            echo "PASS: All version strings consistent ($VERSION_PY)"
          else
            exit 1
          fi

      - name: REUSE compliance check
        run: |
          pip install reuse
          reuse lint
        continue-on-error: false

      - name: Check for secrets in code
        run: |
          echo "Scanning for potential hardcoded secrets..."
          FOUND=0
          # Check for hex strings that look like API keys (64+ chars)
          if grep -rn "['\"][0-9a-f]\{64,\}['\"]" core/ api/ agents/ \
            --include="*.py" 2>/dev/null; then
            echo "WARNING: Possible hardcoded secret found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 0 ]; then
            echo "PASS: No hardcoded secrets detected"
          fi
